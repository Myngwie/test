<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเช็คส้มตำสี่แยกแซ่บนัว</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    body { box-sizing: border-box; }
    * { font-family: 'Sarabun', sans-serif; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    .lang-btn{
      width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;
      font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;border:2px solid transparent;
    }
    .lang-btn.active{ background-color:#ea580c;color:white;border-color:#ea580c; }
    .lang-btn:not(.active){ background-color:white;color:#ea580c;border-color:#f3f4f6; }
    .lang-selector{ display:flex;gap:4px;padding:6px;background:white;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .trend-up{ color:#ef4444; } .trend-down{ color:#22c55e; } .trend-neutral{ color:#6b7280; }
    .qty-invalid{ border-color:#ef4444 !important; background: #fff1f2; }
  </style>
  <style>@view-transition { navigation: auto; }</style>
</head>

<body class="h-full bg-gradient-to-br from-orange-50 via-amber-50 to-yellow-50">
  <div id="app" class="h-full w-full overflow-auto">
    <div id="home-page" class="min-h-full p-4 md:p-6 pt-20">

        <div class="flex items-center justify-between mb-8">

            <p id="txt-daily-check" class="text-orange-600 text-sm mt-1">เช็คสต็อกประจำวัน</p>

          <button onclick="showHistory()" class="flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-md hover:shadow-lg transition-all text-orange-700 font-medium">

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span id="txt-history">ประวัติ</span>

        </div>

        <div class="bg-white rounded-2xl p-4 shadow-md mb-6">
          <p id="txt-date2" class="text-gray-500 text-sm">วันที่</p>
          <p id="current-date" class="text-lg font-semibold text-gray-800"></p>
        </div>

        <div class="space-y-4">
          <button onclick="selectCategory('แม็คโครเช็คทุกวันอาทิตย์กับวันพฤหัส')" class="w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🚣</div>
              <div class="text-left">
                <p id="cat-boat" class="text-xl font-bold">แม็คโครเช็คทุกวันอาทิตย์กับวันพฤหัส</p>
                <p id="cat-boat-desc" class="text-orange-100 text-sm">เช็คสต็อกวัตถุดิบแม็คโครเช็คทุกวันอาทิตย์กับวันพฤหัส</p>
              </div>
              <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>

          <button onclick="selectCategory('เจ๊ปุ่นเช็กทุกวันอาทิตย์และพฤหัส')" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🍳</div>
              <div class="text-left">
                <p id="cat-food" class="text-xl font-bold">เจ๊ปุ่นเช็กทุกวันอาทิตย์และพฤหัส</p>
                <p id="cat-food-desc" class="text-emerald-100 text-sm">เช็คสต็อกเจ๊ปุ่นเช็กทุกวันอาทิตย์และพฤหัส</p>
              </div>
              <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>

          <button onclick="selectCategory('พี่หยี เช็คทุกวัน')" class="w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🧑‍🍳</div>
              <div class="text-left">
                <p id="cat-staff" class="text-xl font-bold">พี่หยี เช็คทุกวัน</p>
                <p id="cat-staff-desc" class="text-blue-100 text-sm">เช็คสต็อกพี่หยี เช็คทุกวัน</p>
              </div>
              <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>

          <button onclick="selectCategory('ผักสด')" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">

              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🥬</div>
              <div class="text-left">
                <p class="text-xl font-bold">ผักสด</p>
                <p class="text-green-100 text-sm">เช็คสต๊อกผักสด</p>

            </div>
          </button>

          <button onclick="selectCategory('เข๋ง(เช็คทุกวัน)')" class="w-full bg-gradient-to-r from-teal-500 to-teal-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">

              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🥗</div>
              <div class="text-left">

              </div>

                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>
        
          <button onclick="selectCategory('ลา(เช็คทุกวัน)')" class="w-full bg-gradient-to-r from-red-500 to-red-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🥩</div>
              <div class="text-left">
                <p class="text-xl font-bold">ลา(เช็คทุกวัน)</p>
                <p class="text-red-100 text-sm">เช็คสต๊อกลา(เช็คทุกวัน)</p>
              </div>
              <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewbox="0 0 24 24">

    </div>

    <div id="name-page" class="min-h-full p-4 md:p-6 hidden">
      <div class="max-w-lg mx-auto fade-in">
        <button onclick="goHome()" class="flex items-center gap-2 text-orange-700 mb-6 hover:text-orange-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          <span id="txt-back-home">กลับหน้าหลัก</span>
        </button>

        <div class="bg-white rounded-2xl p-6 shadow-lg">
          <div id="category-badge" class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-white text-sm font-medium mb-4"></div>
          <h2 id="txt-staff-name-title" class="text-xl font-bold text-gray-800 mb-2">ผู้เช็คสต็อก</h2>
          <p id="txt-staff-name-desc" class="text-gray-500 mb-6">กรุณากรอกชื่อผู้ทำการเช็คสต็อก</p>
          <div class="space-y-4">
            <div>

            </div>
            <button onclick="startChecking()" id="btn-start-checking" class="w-full bg-orange-500 text-white py-4 rounded-xl font-semibold text-lg hover:bg-orange-600 transition-colors shadow-md hover:shadow-lg">เริ่มเช็คสต็อก</button>
          </div>
        </div>
      </div>
    </div>

    <div id="stock-page" class="min-h-full p-4 md:p-6 hidden">
      <div class="max-w-2xl mx-auto fade-in">
        <div class="flex items-center justify-between mb-6">
          <button onclick="goToNamePage()" class="flex items-center gap-2 text-orange-700 hover:text-orange-800 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            <span id="txt-back">กลับ</span>
          </button>
          <div id="stock-category-badge" class="px-4 py-2 rounded-full text-white text-sm font-medium"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-gradient-to-r from-orange-500 to-orange-600 p-4 text-white">
            <p class="text-sm opacity-90"><span id="txt-staff-checker">ผู้เช็คสต็อก:</span> <span id="display-checker-name" class="font-semibold"></span></p>
            <p class="text-sm opacity-90"><span id="txt-date-label">วันที่:</span> <span id="display-date" class="font-semibold"></span></p>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th id="txt-item" class="px-4 py-3 text-left text-sm font-semibold text-gray-700">รายการ</th>
                  <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700 w-28">จำนวนที่ควรมี</th>
                  <th id="txt-quantity" class="px-4 py-3 text-center text-sm font-semibold text-gray-700 w-28">จำนวน</th>
                  <th id="txt-unit" class="px-4 py-3 text-center text-sm font-semibold text-gray-700 w-20">หน่วย</th>
                  <th id="txt-note" class="px-4 py-3 text-left text-sm font-semibold text-gray-700">หมายเหตุ</th>
                </tr>
              </thead>
              <tbody id="stock-table-body" class="divide-y divide-gray-100"></tbody>
            </table>
          </div>

          <div class="p-4 bg-gray-50">
            <button id="save-btn" onclick="saveStock()" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-4 rounded-xl font-semibold text-lg hover:from-green-600 hover:to-green-700 transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
              <span id="txt-save">บันทึกข้อมูล</span>
            </button>
            <p class="text-xs text-gray-500 mt-2">
              * ช่อง “จำนวน” ใส่ได้เฉพาะ 0-9 และสัญลักษณ์ . / + -
            </p>
          </div>
        </div>
      </div>
    </div>

    <div id="history-page" class="min-h-full p-4 md:p-6 hidden">
      <div class="max-w-2xl mx-auto fade-in">
        <button onclick="goHome()" class="flex items-center gap-2 text-orange-700 mb-6 hover:text-orange-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          <span id="txt-back-home2">กลับหน้าหลัก</span>
        </button>

        <h2 id="txt-history-title" class="text-2xl font-bold text-gray-800 mb-4">📋 ประวัติการเช็คสต็อก</h2>

        <div class="bg-white rounded-2xl p-4 shadow-md mb-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label id="txt-select-date" class="block text-sm font-medium text-gray-700 mb-2">เลือกวันที่</label>
              <input type="date" id="filter-date" onchange="filterHistory()" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-colors">
            </div>
            <div>
              <label id="txt-category-label" class="block text-sm font-medium text-gray-700 mb-2">หมวดหมู่</label>
              <select id="filter-category" onchange="filterHistory()" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-colors">
                <option value="" id="opt-all">ทั้งหมด</option>
                <option value="แม็คโครเช็คทุกวันอาทิตย์กับวันพฤหัส">แม็คโครเช็คทุกวันอาทิตย์กับวันพฤหัส</option>
                <option value="เจ๊ปุ่นเช็กทุกวันอาทิตย์และพฤหัส">เจ๊ปุ่นเช็กทุกวันอาทิตย์และพฤหัส</option>
                <option value="พี่หยี เช็คทุกวัน">พี่หยี เช็คทุกวัน</option>
                <option value="ผักสด">ผักสด</option>
                <option value="เข๋ง(เช็คทุกวัน)">เข๋ง(เช็คทุกวัน)</option>
                <option value="ลา(เช็คทุกวัน)">ลา(เช็คทุกวัน)</option>
              </select>
            </div>
          </div>
        </div>

        <div id="history-list" class="space-y-4"></div>
        <div id="no-history" class="hidden text-center py-12">
          <div class="text-6xl mb-4">📭</div>
          <p id="txt-no-history" class="text-gray-500">ไม่พบประวัติการเช็คสต็อก</p>
        </div>
      </div>
    </div>

    <div id="history-detail-page" class="min-h-full p-4 md:p-6 hidden">
      <div class="max-w-2xl mx-auto fade-in">
        <button onclick="showHistory()" class="flex items-center gap-2 text-orange-700 mb-6 hover:text-orange-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          <span id="txt-back-history">กลับหน้าประวัติ</span>
        </button>
        <div id="history-detail-content" class="bg-white rounded-2xl shadow-lg overflow-hidden"></div>
      </div>
    </div>

    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-xl shadow-lg hidden transition-all duration-300 flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
      <span id="toast-message">บันทึกสำเร็จ!</span>
    </div>
  </div>

    let currentCategory = '';
    let globalHistoryCache = [];

    window.addEventListener('DOMContentLoaded', () => {
      setupDate_();
      pollData_();
      setInterval(pollData_, SHEET_POLL_MS);
    });

    function setupDate_(){
      const d = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const s = d.toLocaleDateString('th-TH', options);
      const cd = document.getElementById('current-date');
      if(cd) cd.textContent = s;
      const fDate = document.getElementById('filter-date');
      if(fDate) {
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const dd = String(d.getDate()).padStart(2,'0');
        fDate.value = `${yyyy}-${mm}-${dd}`;
      }
    }

    function selectCategory(cat){
      currentCategory = cat;
      document.getElementById('home-page').classList.add('hidden');
      document.getElementById('name-page').classList.remove('hidden');
      
      const badge = document.getElementById('category-badge');
      if(badge) {
        badge.textContent = cat;
        badge.className = `inline-flex items-center gap-2 px-4 py-2 rounded-full text-white text-sm font-medium mb-4 ${getCategoryColorClass_(cat)}`;
      }
      
      const cachedName = localStorage.getItem('checker_name_v2');
      if(cachedName) document.getElementById('checker-name').value = cachedName;
    }

    function getCategoryColorClass_(cat){
      if(cat==='แม็คโครเช็คทุกวันอาทิตย์กับวันพฤหัส') return 'bg-orange-500';
      if(cat==='เจ๊ปุ่นเช็กทุกวันอาทิตย์และพฤหัส') return 'bg-emerald-500';
      if(cat==='พี่หยี เช็คทุกวัน') return 'bg-blue-500';
      if(cat==='ผักสด') return 'bg-green-500';
      if(cat==='เข๋ง(เช็คทุกวัน)') return 'bg-teal-500';
      return 'bg-red-500';
    }

    function startChecking(){
      const nameInput = document.getElementById('checker-name').value.trim();
      if(!nameInput){
        alert(translations[currentLanguage].enterName2);
        return;
      }
      localStorage.setItem('checker_name_v2', nameInput);
      document.getElementById('name-page').classList.add('hidden');
      document.getElementById('stock-page').classList.remove('hidden');
      
      const badge = document.getElementById('stock-category-badge');
      if(badge) {
        badge.textContent = currentCategory;
        badge.className = `px-4 py-2 rounded-full text-white text-sm font-medium ${getCategoryColorClass_(currentCategory)}`;
      }
      
      document.getElementById('display-checker-name').textContent = nameInput;
      const d = new Date();
      document.getElementById('display-date').textContent = d.toLocaleDateString('th-TH') + ' ' + d.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
      renderStockTable_();
    }

    function renderStockTable_(){
      const tbody = document.getElementById('stock-table-body');
      tbody.innerHTML = '';
      const items = stockItems[currentCategory] || [];
      items.forEach((item, idx) => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50';
        tr.innerHTML = `
          <td class="px-4 py-3 font-medium text-gray-800">${item.name}</td>
          <td class="px-4 py-3 text-center font-bold text-blue-600 bg-gray-50 select-none">1</td>
          <td class="px-4 py-3 text-center">
            <input type="text" data-idx="${idx}" class="qty-input w-20 px-2 py-1 border rounded-lg text-center font-semibold focus:border-orange-500 focus:outline-none" oninput="cleanInput_(this)">
          </td>
          <td class="px-4 py-3 text-center text-gray-600">${item.unit}</td>
          <td class="px-4 py-3">
            <input type="text" data-note-idx="${idx}" class="note-input w-full px-2 py-1 border rounded-lg focus:border-orange-500 focus:outline-none text-sm">
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function cleanInput_(input){
      let v = input.value;
      v = v.replace(/[^0-9\.\/\+\-]/g, '');
      input.value = v;
      if(validateQtyStr_(v) || v===''){
        input.classList.remove('qty-invalid');
      } else {
        input.classList.add('qty-invalid');
      }
    }

    function validateQtyStr_(s){
      if(!s) return true;
      if(/^[0-9\.]+$/.test(s)) return true;
      if(/^[0-9\.]+\/[0-9\.]+$/.test(s)) return true;
      if(/^[\+\-][0-9\.]+$/.test(s)) return true;
      return false;
    }

    function saveStock(){
      const inputs = document.querySelectorAll('.qty-input');
      const items = stockItems[currentCategory] || [];
      const payloadItems = [];
      let hasInvalid = false;

      inputs.forEach(input => {
        const v = input.value.trim();
        if(!validateQtyStr_(v)){
          input.classList.add('qty-invalid');
          hasInvalid = true;
        }
      });

      if(hasInvalid){
        alert(translations[currentLanguage].invalidQty);
        return;
      }

      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      saveBtn.style.opacity = '0.5';

      inputs.forEach(input => {
        const idx = parseInt(input.getAttribute('data-idx'));
        const noteInput = document.querySelector(`.note-input[data-note-idx="${idx}"]`);
        payloadItems.push({
          name: items[idx].name,
          qty: input.value.trim(),
          unit: items[idx].unit,
          note: noteInput ? noteInput.value.trim() : ''
        });
      });

      const payload = {
        action: 'saveStock',
        category: currentCategory,
        checker: document.getElementById('checker-name').value.trim(),
        items: payloadItems
      };

      fetch(GOOGLE_SHEET_WEBAPP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(() => {
        showToast(translations[currentLanguage].saved);
        setTimeout(() => { goHome(); pollData_(); }, 1500);
      })
      .catch(err => {
        console.error(err);
        alert(translations[currentLanguage].error);
      })
      .finally(() => {
        saveBtn.disabled = false;
        saveBtn.style.opacity = '1';
      });
    }

    function showToast(msg){
      const t = document.getElementById('toast');
      document.getElementById('toast-message').textContent = msg;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    function goHome(){
      currentCategory = '';
      document.getElementById('name-page').classList.add('hidden');
      document.getElementById('stock-page').classList.add('hidden');
      document.getElementById('history-page').classList.add('hidden');
      document.getElementById('history-detail-page').classList.add('hidden');
      document.getElementById('home-page').classList.remove('hidden');
    }
    function goToNamePage(){
      document.getElementById('stock-page').classList.add('hidden');
      document.getElementById('name-page').classList.remove('hidden');
    }
    function showHistory(){
      document.getElementById('home-page').classList.add('hidden');
      document.getElementById('history-detail-page').classList.add('hidden');
      document.getElementById('history-page').classList.remove('hidden');
      filterHistory();
    }

    function pollData_(){
      fetch(`${GOOGLE_SHEET_WEBAPP_URL}?action=getHistory`)
      .then(res => res.json())
      .then(data => {
        if(Array.isArray(data)) {
          globalHistoryCache = data;
          if(!document.getElementById('history-page').classList.contains('hidden')){
            filterHistory();
          }
        }
      }).catch(err => console.error("Error polling:", err));
    }

    function filterHistory(){
      const fDate = document.getElementById('filter-date').value;
      const fCat = document.getElementById('filter-category').value;
      const listContainer = document.getElementById('history-list');
      const noHistory = document.getElementById('no-history');
      listContainer.innerHTML = '';

      let filtered = globalHistoryCache;
      if(fDate) {
        filtered = filtered.filter(h => {
          if(!h.timestamp) return false;
          const d = h.timestamp.split('T')[0];
          return d === fDate;
        });
      }
      if(fCat) {
        filtered = filtered.filter(h => h.category === fCat);
      }

      if(filtered.length === 0){
        noHistory.classList.remove('hidden');
        return;
      }
      noHistory.classList.add('hidden');

      filtered.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

      filtered.forEach(h => {
        const div = document.createElement('div');
        div.className = 'bg-white rounded-2xl p-4 shadow-md hover:shadow-lg transition-all cursor-pointer border-l-4 ' + getCategoryBorderClass_(h.category);
        const dStr = new Date(h.timestamp).toLocaleString('th-TH', {hour:'2-digit', minute:'2-digit'});
        div.onclick = () => showHistoryDetail(h);
        div.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <p class="font-bold text-gray-800">${h.category}</p>
              <p class="text-sm text-gray-500 mt-1">${translations[currentLanguage].staffName}: ${h.checker}</p>
            </div>
            <p class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-md font-medium">${dStr}</p>
          </div>
        `;
        listContainer.appendChild(div);
      });
    }

    function getCategoryBorderClass_(cat){
      if(cat==='แม็คโครเช็คทุกวันอาทิตย์กับวันพฤหัส') return 'border-orange-500';
      if(cat==='เจ๊ปุ่นเช็กทุกวันอาทิตย์และพฤหัส') return 'border-emerald-500';
      if(cat==='พี่หยี เช็คทุกวัน') return 'border-blue-500';
      if(cat==='ผักสด') return 'border-green-500';
      if(cat==='เข๋ง(เช็คทุกวัน)') return 'border-teal-500';
      return 'border-red-500';
    }

    function showHistoryDetail(h){
      document.getElementById('history-page').classList.add('hidden');
      const detailPage = document.getElementById('history-detail-page');
      detailPage.classList.remove('hidden');
      const container = document.getElementById('history-detail-content');
      const dStr = new Date(h.timestamp).toLocaleString('th-TH');
      const t = translations[currentLanguage];

      let rowsHtml = '';
      const items = h.items || [];
      items.forEach(item => {
        let comparison = `<td class="px-4 py-3 text-center text-gray-400">-</td>
                          <td class="px-4 py-3 text-center text-gray-400">-</td>
                          <td class="px-4 py-3 text-center text-gray-400">-</td>`;
        if(h.comparisonAvailable && h.previousRecord) {
          const prevItem = h.previousRecord.items.find(pi => pi.name === item.name);
          if(prevItem) {
            const currentQty = getDisplayQty_(item);
            const prevQty = getDisplayQty_(prevItem);
            let trend = `<span class="trend-neutral">→</span>`;
            let pctHtml = `<span class="text-gray-400">-</span>`;
            if(typeof currentQty === 'number' && typeof prevQty === 'number') {
              const diff = currentQty - prevQty;
              if(diff > 0) {
                trend = `<span class="trend-up">▲ +${fmtQty(diff)}</span>`;
                pctHtml = `<span class="trend-up">+${Math.round((diff/prevQty)*100)}%</span>`;
              } else if(diff < 0) {
                trend = `<span class="trend-down">▼ ${fmtQty(diff)}</span>`;
                pctHtml = `<span class="trend-down">${Math.round((diff/prevQty)*100)}%</span>`;
              } else {
                trend = `<span class="text-gray-400">=</span>`;
                pctHtml = `<span class="text-gray-400">0%</span>`;
              }
            }
            comparison = `
              <td class="px-4 py-3 text-center font-semibold text-gray-600">${fmtQty(getDisplayQty_(prevItem))} ${getDisplayUnit_(prevItem)}</td>
              <td class="px-4 py-3 text-center font-semibold">${trend}</td>
              <td class="px-4 py-3 text-center font-semibold">${pctHtml}</td>`;
          } else {
            comparison = `<td class="px-4 py-3 text-center text-gray-400">-</td>
                          <td class="px-4 py-3 text-center"><span class="text-xs text-blue-600">${t.noPrevious}</span></td>
                          <td class="px-4 py-3 text-center"><span class="text-gray-400">-</span></td>`;
          }
        }

        const displayQty = getDisplayQty_(item);
        const displayUnit = getDisplayUnit_(item);

        rowsHtml += `
          <tr class="hover:bg-gray-50">
            <td class="px-4 py-3 font-medium text-gray-800">${item.name}</td>
            <td class="px-4 py-3 text-center font-bold text-blue-600 bg-gray-50">1</td>
            <td class="px-4 py-3 text-center font-semibold ${Number(displayQty || 0) > 0 ? 'text-green-600' : 'text-red-500'}">${fmtQty(displayQty)}</td>
            <td class="px-4 py-3 text-center text-gray-600">${displayUnit}</td>
            ${comparison}
            <td class="px-4 py-3 text-sm text-gray-600 max-w-xs truncate">${item.note || '-'}</td>
          </tr>
        `;
      });

      let compHeaders = '';
      if(h.comparisonAvailable && h.previousRecord){
        const pTime = new Date(h.previousRecord.timestamp).toLocaleString('th-TH', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
        compHeaders = `
          <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider bg-gray-100/50 w-32">${t.compared} (${pTime})</th>
          <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider bg-gray-100/50 w-28">${t.changeLabel}</th>
          <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider bg-gray-100/50 w-24">${t.changePctLabel}</th>
        `;
      } else {
        compHeaders = `
          <th class="px-4 py-3 text-center text-xs font-semibold text-gray-400 bg-gray-100/50 w-32">-</th>
          <th class="px-4 py-3 text-center text-xs font-semibold text-gray-400 bg-gray-100/50 w-28">-</th>
          <th class="px-4 py-3 text-center text-xs font-semibold text-gray-400 bg-gray-100/50 w-24">-</th>
        `;
      }

      container.innerHTML = `
        <div class="bg-gradient-to-r ${getCategoryGradient_(h.category)} p-6 text-white">
          <span class="px-3 py-1 bg-white/20 rounded-full text-xs font-medium mb-3 inline-block">${h.category}</span>
          <h3 class="text-xl font-bold">${h.checker}</h3>
          <p class="text-sm opacity-90 mt-1">${dStr}</p>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-100">
              <tr>
                <th class="px-4 py-3 text-left font-semibold text-gray-700">${t.item}</th>
                <th class="px-4 py-3 text-center font-semibold text-gray-700 w-28">ควรมี</th>
                <th class="px-4 py-3 text-center font-semibold text-gray-700 w-24">${t.quantity}</th>
                <th class="px-4 py-3 text-center font-semibold text-gray-700 w-20">${t.unit}</th>
                ${compHeaders}
                <th class="px-4 py-3 text-left font-semibold text-gray-700">${t.note}</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">${rowsHtml}</tbody>
          </table>
        </div>
      `;
    }

    function getCategoryGradient_(cat){
      if(cat==='แม็คโครเช็คทุกวันอาทิตย์กับวันพฤหัส') return 'from-orange-500 to-orange-600';
      if(cat==='เจ๊ปุ่นเช็กทุกวันอาทิตย์และพฤหัส') return 'from-emerald-500 to-emerald-600';
      if(cat==='พี่หยี เช็คทุกวัน') return 'from-blue-500 to-blue-600';
      if(cat==='ผักสด') return 'from-green-500 to-green-600';
      if(cat==='เข๋ง(เช็คทุกวัน)') return 'from-teal-500 to-teal-600';
      return 'from-red-500 to-red-600';
    }

    function getDisplayQty_(item){
      if(item.qty === undefined || item.qty === null) return '';
      const s = String(item.qty).trim();
      if(/^[0-9\.]+$/.test(s)) return parseFloat(s);
      return s;
    }
    function getDisplayUnit_(item){ return item.unit || ''; }
    function fmtQty(q){
      if(typeof q === 'number') { return Number(q.toFixed(2)).toString(); }
      return q || '-';
    }
  </script>
</body>
</html>
